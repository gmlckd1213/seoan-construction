<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시공실적 관리 - 서안종합건설</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f6f3ed; color: #3d3630; }
        .header {
            background: #3d3630;
            color: #faf8f4;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.1rem; font-weight: 500; }
        .header a { color: #b8926a; text-decoration: none; font-size: 0.85rem; }
        .container { max-width: 1100px; margin: 32px auto; padding: 0 24px; }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .top-bar h2 { font-size: 1.2rem; font-weight: 500; }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-primary { background: #3d3630; color: #fff; }
        .btn-primary:hover { background: #5a4f44; }
        .btn-danger { background: #c0392b; color: #fff; font-size: 0.8rem; padding: 6px 14px; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-edit { background: #b8926a; color: #fff; font-size: 0.8rem; padding: 6px 14px; }
        .btn-edit:hover { background: #c9a87c; }
        .message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 16px;
            font-size: 0.9rem;
        }
        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        th { background: #f0ece4; padding: 12px 16px; font-size: 0.8rem; font-weight: 500; text-align: left; color: #9a8e80; }
        td { padding: 14px 16px; font-size: 0.9rem; border-top: 1px solid #e0d8cc; vertical-align: middle; }
        .thumb { width: 60px; height: 45px; object-fit: cover; border-radius: 4px; }
        .category-tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
            background: #f0ece4;
            color: #5a4f44;
        }
        .actions { display: flex; gap: 8px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>(주)서안종합건설 관리자</h1>
        <a href="/admin/logout">로그아웃</a>
    </div>
    <div class="container">
        <div class="top-bar">
            <h2>시공실적 관리</h2>
            <a href="/admin/portfolios/new" class="btn btn-primary">+ 새 글 작성</a>
        </div>

        <div th:if="${message}" class="message" th:text="${message}"></div>

        <table>
            <thead>
                <tr>
                    <th>사진</th>
                    <th>카테고리</th>
                    <th>제목</th>
                    <th>위치</th>
                    <th>기간</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p : ${portfolios}">
                    <td>
                        <img th:if="${p.thumbnailUrl}" th:src="${p.thumbnailUrl}" class="thumb" alt="">
                        <span th:unless="${p.thumbnailUrl}" style="color:#ccc;">없음</span>
                    </td>
                    <td><span class="category-tag" th:text="${p.categoryLabel}"></span></td>
                    <td th:text="${p.title}"></td>
                    <td th:text="${p.location}"></td>
                    <td th:text="${p.period}"></td>
                    <td class="actions">
                        <a th:href="@{'/admin/portfolios/' + ${p.id} + '/edit'}" class="btn btn-edit">수정</a>
                        <form th:action="@{'/admin/portfolios/' + ${p.id} + '/delete'}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?');">
                            <button type="submit" class="btn btn-danger">삭제</button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(portfolios)}">
                    <td colspan="6" style="text-align:center;padding:40px;color:#9a8e80;">등록된 시공실적이 없습니다.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
