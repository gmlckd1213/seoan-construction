<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${portfolio.id != null} ? '시공실적 수정' : '시공실적 등록'">시공실적</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f6f3ed; color: #3d3630; }
        .header {
            background: #3d3630;
            color: #faf8f4;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.1rem; font-weight: 500; }
        .header a { color: #b8926a; text-decoration: none; font-size: 0.85rem; }
        .container { max-width: 800px; margin: 32px auto; padding: 0 24px; }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 36px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        h2 { font-size: 1.2rem; font-weight: 500; margin-bottom: 28px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #9a8e80;
            margin-bottom: 6px;
            font-weight: 400;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #e0d8cc;
            border-radius: 6px;
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            border-color: #b8926a;
        }
        .form-group textarea { resize: vertical; min-height: 120px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.3s;
        }
        .btn-primary { background: #3d3630; color: #fff; }
        .btn-primary:hover { background: #5a4f44; }
        .btn-secondary { background: #e0d8cc; color: #3d3630; }
        .btn-secondary:hover { background: #d5ccbe; }
        .btn-danger-sm { background: #c0392b; color: #fff; font-size: 0.75rem; padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .buttons { display: flex; gap: 12px; margin-top: 28px; }
        .existing-images {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .img-item {
            position: relative;
            width: 120px;
            height: 90px;
            border-radius: 6px;
            overflow: hidden;
        }
        .img-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .img-item form {
            position: absolute;
            top: 4px;
            right: 4px;
        }
        .file-input-area {
            border: 2px dashed #e0d8cc;
            border-radius: 8px;
            padding: 32px;
            text-align: center;
            color: #9a8e80;
            font-size: 0.85rem;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        .file-input-area:hover { border-color: #b8926a; }
        .file-input-area input { display: none; }
        .preview-area { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
        .preview-area img { width: 100px; height: 75px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>(주)서안종합건설 관리자</h1>
        <a href="/admin/portfolios">목록으로</a>
    </div>
    <div class="container">
        <div class="card">
            <h2 th:text="${portfolio.id != null} ? '시공실적 수정' : '시공실적 등록'"></h2>

            <form th:action="${portfolio.id != null} ? @{'/admin/portfolios/' + ${portfolio.id}} : @{/admin/portfolios}"
                  method="post" enctype="multipart/form-data">

                <div class="form-group">
                    <label>제목 *</label>
                    <input type="text" name="title" th:value="${portfolio.title}" required placeholder="예: 남양주 다세대주택 신축">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>카테고리 *</label>
                        <select name="category" id="categorySelect" required>
                            <option value="">선택</option>
                            <option value="building" th:selected="${portfolio.category == 'building'}">건물</option>
                            <option value="civil" th:selected="${portfolio.category == 'civil'}">토목</option>
                            <option value="interior" th:selected="${portfolio.category == 'interior'}">인테리어</option>
                            <option value="remodel" th:selected="${portfolio.category == 'remodel'}">리모델링</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>카테고리 표시명</label>
                        <input type="text" name="categoryLabel" id="categoryLabel" th:value="${portfolio.categoryLabel}" placeholder="자동 입력됩니다">
                    </div>
                </div>

                <div class="form-group">
                    <label>부제목</label>
                    <input type="text" name="subtitle" th:value="${portfolio.subtitle}" placeholder="예: 지상 5층 · 연면적 1,200평">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>공사 규모</label>
                        <input type="text" name="scale" th:value="${portfolio.scale}" placeholder="예: 지상 5층 · 연면적 1,200평">
                    </div>
                    <div class="form-group">
                        <label>공사 기간</label>
                        <input type="text" name="period" th:value="${portfolio.period}" placeholder="예: 2024.03 ~ 2024.11">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>위치</label>
                        <input type="text" name="location" th:value="${portfolio.location}" placeholder="예: 경기도 남양주시">
                    </div>
                    <div class="form-group">
                        <label>발주처</label>
                        <input type="text" name="client" th:value="${portfolio.client}" placeholder="예: 민간 발주">
                    </div>
                </div>

                <div class="form-group">
                    <label>상세 설명</label>
                    <textarea name="description" th:text="${portfolio.description}" placeholder="프로젝트에 대한 상세 설명을 입력하세요."></textarea>
                </div>

                <div class="form-group">
                    <label>정렬 순서</label>
                    <input type="number" name="sortOrder" th:value="${portfolio.sortOrder}" placeholder="0">
                </div>

                <!-- 기존 이미지 (수정 시) -->
                <div th:if="${portfolio.id != null && !portfolio.images.isEmpty()}" class="form-group">
                    <label>등록된 이미지</label>
                    <div class="existing-images">
                        <div th:each="img : ${portfolio.images}" class="img-item">
                            <img th:src="${img.imageUrl}" alt="">
                            <form th:action="@{'/admin/portfolios/images/' + ${img.id} + '/delete'}" method="post">
                                <input type="hidden" name="portfolioId" th:value="${portfolio.id}">
                                <button type="submit" class="btn-danger-sm" onclick="return confirm('삭제?');">X</button>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 새 이미지 업로드 -->
                <div class="form-group">
                    <label>사진 업로드</label>
                    <div class="file-input-area" onclick="document.getElementById('fileInput').click();">
                        클릭하여 이미지를 선택하세요 (여러 장 가능)
                        <input type="file" id="fileInput" name="files" multiple accept="image/*">
                    </div>
                    <div class="preview-area" id="previewArea"></div>
                </div>

                <input type="hidden" name="categoryLabel" id="categoryLabelHidden">

                <div class="buttons">
                    <button type="submit" class="btn btn-primary" th:text="${portfolio.id != null} ? '수정하기' : '등록하기'"></button>
                    <a href="/admin/portfolios" class="btn btn-secondary">취소</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 카테고리 선택 시 표시명 자동 입력
        var labels = { building: '건축공사', civil: '토목공사', interior: '인테리어', remodel: '리모델링' };
        document.getElementById('categorySelect').addEventListener('change', function() {
            document.getElementById('categoryLabel').value = labels[this.value] || '';
        });

        // 이미지 미리보기
        document.getElementById('fileInput').addEventListener('change', function() {
            var area = document.getElementById('previewArea');
            area.innerHTML = '';
            Array.from(this.files).forEach(function(file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = document.createElement('img');
                    img.src = e.target.result;
                    area.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        });
    </script>
</body>
</html>
