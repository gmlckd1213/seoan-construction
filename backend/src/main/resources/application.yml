server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/seoan?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  thymeleaf:
    cache: false

app:
  upload-dir: ./uploads
  cors:
    allowed-origins: http://localhost:5500,http://127.0.0.1:5500
