<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - 서안종합건설</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #f6f3ed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-box {
            background: #fff;
            padding: 48px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
        }
        .login-box h1 {
            font-size: 1.4rem;
            color: #3d3630;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .login-box p {
            font-size: 0.85rem;
            color: #9a8e80;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #9a8e80;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0d8cc;
            border-radius: 6px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #b8926a;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #3d3630;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.3s;
        }
        .btn:hover { background: #5a4f44; }
        .error {
            background: #ffeaea;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-box">
        <h1>관리자 로그인</h1>
        <p>(주)서안종합건설 관리 시스템</p>
        <div th:if="${param.error}" class="error">아이디 또는 비밀번호가 올바르지 않습니다.</div>
        <div th:if="${param.logout}" style="background:#e8f5e9;color:#2e7d32;padding:10px 14px;border-radius:6px;font-size:0.85rem;margin-bottom:16px;">로그아웃되었습니다.</div>
        <form th:action="@{/admin/login}" method="post">
            <div class="form-group">
                <label>아이디</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">로그인</button>
        </form>
    </div>
</body>
</html>
